<!DOCTYPE html>
<html lang="en" data-theme="sharks">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Hockey B.L.A.S.T{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* ── Base layout: teal background like the original ── */
        html, body {
            background-color: #2aada1 !important;
            color: #ffffff;
            min-height: 100vh;
        }

        /* ── Nav pills in scrollable strip ── */
        .nav-pill {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 999px;
            font-size: 0.82rem;
            font-weight: 600;
            color: #ffffff !important;
            text-decoration: none;
            white-space: nowrap;
            background-color: rgba(0,0,0,0.15);
            transition: background-color 0.15s, color 0.15s;
        }
        .nav-pill:hover, .nav-pill:active {
            background-color: #E57200 !important;
            color: #ffffff !important;
        }
        /* Hide scrollbar on the nav strip */
        nav::-webkit-scrollbar { display: none; }

        /* ── Plotly charts: white card so they pop off the teal bg ── */
        .js-plotly-plot, .plotly-graph-div {
            background: #ffffff !important;
            border-radius: 10px;
            padding: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        /* ── Tables: dark teal header, white rows, dark text ── */
        .table {
            background-color: transparent;
        }
        .table thead tr th {
            background-color: #1a5c55 !important;
            color: #ffffff !important;
            font-weight: 700;
        }
        .table tbody tr {
            background-color: #ffffff !important;
            color: #111111 !important;
        }
        .table-zebra tbody tr:nth-child(even) {
            background-color: #d6f0ed !important;
            color: #111111 !important;
        }
        .table tbody td, .table tbody th {
            color: #111111 !important;
        }
        /* Links inside tables */
        .table a {
            color: #0057b8 !important;
            text-decoration: none;
        }
        .table a:hover { text-decoration: underline; }

        /* ── Headings and general text on teal bg ── */
        h1, h2, h3, h4, h5, h6, p, label, span:not(.badge) {
            color: #ffffff;
        }
        /* Links inside headings — orange so they're visible on teal */
        h1 a, h2 a, h3 a, h4 a {
            color: #E57200 !important;
            text-decoration: none;
        }
        h1 a:hover, h2 a:hover { text-decoration: underline; }
        /* Form controls */
        select, input, textarea {
            background-color: #ffffff !important;
            color: #111111 !important;
            border: 1px solid #156b62;
        }
        /* Cards/boxes */
        .card, .bg-base-100, .bg-base-200, .bg-base-300 {
            background-color: #1d8a7e !important;
            color: #ffffff;
        }
        /* Buttons */
        .btn-primary {
            background-color: #E57200 !important;
            border-color: #E57200 !important;
            color: #ffffff !important;
        }
        .btn-primary:hover {
            background-color: #c96400 !important;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="min-h-screen">
    <!-- Sticky header: logo row + scrollable nav strip -->
    <header style="position:sticky;top:0;z-index:100;background-color:#1d8a7e;box-shadow:0 2px 6px rgba(0,0,0,0.3);">
        <!-- Logo row -->
        <div style="display:flex;align-items:center;padding:8px 16px;border-bottom:1px solid #156b62;">
            <a href="{{ url_for('index', top_n=10) }}" style="color:#ffffff;font-size:1.1rem;font-weight:700;text-decoration:none;letter-spacing:0.02em;">
                🏒 <span style="color:#E57200;">Hockey</span> B.L.A.S.T
            </a>
        </div>
        <!-- Scrollable nav strip — one line, swipe on mobile, no dropdown -->
        <nav style="overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch;scrollbar-width:none;">
            <div style="display:inline-flex;gap:4px;padding:6px 12px;">
                <a href="{{ url_for('index', top_n=10) }}" class="nav-pill">Main</a>
                <a href="{{ url_for('skater_performance.skater_performance') }}" class="nav-pill">Skaters</a>
                <a href="{{ url_for('goalie_performance.goalie_performance') }}" class="nav-pill">Goalies</a>
                <a href="{{ url_for('referee_performance.referee_performance') }}" class="nav-pill">Refs</a>
                <a href="{{ url_for('games.games', top_n=20, org_id='1', level_id='', season_id='', game_status='completed') }}" class="nav-pill">Games</a>
                <a href="{{ url_for('penalties.penalties', top_n=20, org_id='1', level_id='', season_id='', player_status='active', team_id='') }}" class="nav-pill">Penalties</a>
                <a href="{{ url_for('hall_of_fame.hall_of_fame', top_n=20) }}" class="nav-pill">Hall of Fame</a>
                <a href="{{ url_for('special_stats') }}" class="nav-pill">Special</a>
                <a href="{{ url_for('about') }}" class="nav-pill">About</a>
            </div>
        </nav>
    </header>
    <div class="container mx-auto px-4 py-6 max-w-6xl">
        {% block content %}{% endblock %}
    </div>
    <footer class="footer footer-center p-4 mt-8 bg-base-200 text-base-content/50 text-xs border-t border-base-content/10">
        <span>🏒 Hockey B.L.A.S.T · Beer League Analytics and Stats</span>
    </footer>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
