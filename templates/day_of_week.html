{% extends "base.html" %}

{% block title %}Percentage of Games by Day of the Week{% endblock %}

{% block content %}
<h2 class="text-lg font-bold mt-4 mb-3 text-primary">Percentage of Games by Day of the Week</h2>

<div class="flex flex-wrap gap-3 mb-3 items-end">
    <div class="form-control">
        <label class="label py-1"><span class="label-text text-xs">Organization</span></label>
        <select class="select select-bordered select-primary select-sm bg-base-100" id="org-select">
            {% for org in organizations %}
            <option value="{{ org.id }}">{{ org.organization_name }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="form-control">
        <label class="label py-1"><span class="label-text text-xs">League</span></label>
        <select class="select select-bordered select-primary select-sm bg-base-100" id="league-select">
            <option value="">All Leagues</option>
        </select>
    </div>
    <div class="form-control">
        <label class="label py-1"><span class="label-text text-xs">Division</span></label>
        <select class="select select-bordered select-primary select-sm bg-base-100" id="plot-level">
            <option value="all">All</option>
        </select>
    </div>
    <div class="form-control">
        <label class="label py-1"><span class="label-text text-xs">Aggregate by</span></label>
        <select class="select select-bordered select-primary select-sm bg-base-100" id="x-axis">
            <option value="season_name">Seasons</option>
            <option value="year_month">Year + Month</option>
        </select>
    </div>
    <button class="btn btn-primary btn-sm mb-0.5" id="update-plot">Update Plot</button>
</div>

<div id="plot" style="width:100%;height:420px;border-radius:8px;overflow:hidden;"></div>
<div class="overflow-x-auto mt-4">
    <table class="table table-zebra table-sm" id="data-table">
        <thead></thead>
        <tbody></tbody>
    </table>
</div>

<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<script>
    function getOrgId()    { return document.getElementById('org-select').value || null; }
    function getLeagueId() { return document.getElementById('league-select').value || null; }
    function getLevel()    { return document.getElementById('plot-level').value || 'all'; }
    function getXAxis()    { return document.getElementById('x-axis').value; }

    function post(url, body) {
        return fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        }).then(r => r.json());
    }

    function fetchLeagues() {
        post('/get_day_of_week_leagues', { org_id: getOrgId() }).then(data => {
            const sel = document.getElementById('league-select');
            sel.innerHTML = '<option value="">All Leagues</option>';
            data.forEach(l => {
                sel.innerHTML += `<option value="${l.id}">${l.league_name}</option>`;
            });
            fetchLevels();
        });
    }

    function fetchLevels() {
        post('/get_day_of_week_levels', { org_id: getOrgId(), league_id: getLeagueId() }).then(data => {
            const sel = document.getElementById('plot-level');
            sel.innerHTML = '<option value="all">All</option>';
            data.forEach(lvl => {
                sel.innerHTML += `<option value="${lvl}">${lvl}</option>`;
            });
        });
    }

    function loadPlot() {
        post('/get_day_of_week_data', {
            x_axis: getXAxis(),
            plot_level: getLevel(),
            league_id: getLeagueId(),
            org_id: getOrgId(),
        }).then(data => {
            var traces = [];
            var sortedX = data.x;
            for (var day in data.y) {
                traces.push({ x: sortedX, y: data.y[day], mode: 'lines', name: day });
            }
            var layout = {
                title: { text: 'Percentage of Games by Day of the Week', font: { color: '#e0f0f0', size: 14 } },
                xaxis: {
                    title: getXAxis() === 'year_month' ? 'Year + Month' : 'Season Name',
                    tickangle: -45,
                    color: '#e0f0f0',
                    gridcolor: '#1a6b6b'
                },
                yaxis: { title: 'Percentage of Games', color: '#e0f0f0', gridcolor: '#1a6b6b' },
                margin: { t: 50, b: 100, l: 60, r: 20 },
                paper_bgcolor: '#0d5555',
                plot_bgcolor: '#0a4444',
                font: { color: '#e0f0f0', size: 12 },
                legend: { orientation: 'h', y: -0.25, font: { color: '#e0f0f0', size: 11 } },
                height: 420
            };
            Plotly.newPlot('plot', traces, layout, { responsive: true, displayModeBar: false });

            // Table
            var table = document.getElementById('data-table');
            var thead = table.querySelector('thead');
            var tbody = table.querySelector('tbody');
            thead.innerHTML = '';
            tbody.innerHTML = '';
            var headerRow = document.createElement('tr');
            var th0 = document.createElement('th');
            th0.innerText = 'Day of the Week';
            headerRow.appendChild(th0);
            data.x.slice(-24).forEach(function (x_value) {
                var th = document.createElement('th');
                th.innerText = x_value;
                headerRow.appendChild(th);
            });
            thead.appendChild(headerRow);
            ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'].forEach(function (day) {
                var row = document.createElement('tr');
                var td0 = document.createElement('td');
                td0.innerText = day;
                row.appendChild(td0);
                data.y[day].slice(-24).forEach(function (value) {
                    var td = document.createElement('td');
                    td.innerText = (value * 100).toFixed(1) + '%';
                    row.appendChild(td);
                });
                tbody.appendChild(row);
            });
        });
    }

    document.getElementById('org-select').addEventListener('change', function () {
        fetchLeagues();
        loadPlot();
    });
    document.getElementById('league-select').addEventListener('change', function () {
        fetchLevels();
        loadPlot();
    });
    document.getElementById('plot-level').addEventListener('change', loadPlot);
    document.getElementById('update-plot').addEventListener('click', loadPlot);

    document.addEventListener('DOMContentLoaded', function () {
        fetchLeagues();  // also triggers fetchLevels + initial loadPlot cascades
        loadPlot();
    });
</script>
{% endblock %}
