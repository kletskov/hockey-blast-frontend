{% extends "base.html" %}

{% block title %}Percentage of Games by Day of the Week{% endblock %}

{% block content %}
<h2 class="text-lg font-bold mt-4 mb-3 text-primary">Percentage of Games by Day of the Week</h2>
<div class="form-control mb-2">
    <label for="x-axis" class="label"><span class="label-text">Aggregate by:</span></label>
    <select class="select select-bordered select-primary select-sm bg-base-100" id="x-axis">
        <option value="season_name">Seasons</option>
        <option value="year_month">Year + Month</option>
    </select>
    <label for="plot-level" class="label mt-2"><span class="label-text">Choose a Division:</span></label>
    <select class="select select-bordered select-primary select-sm bg-base-100" id="plot-level">
        <option value="all">All</option>
        {% for level in levels %}
        <option value="{{ level }}">{{ level }}</option>
        {% endfor %}
    </select>
</div>
<button class="btn btn-primary btn-sm mb-4" id="update-plot">Update Plot</button>
<div id="plot" style="width:100%;height:420px;border-radius:8px;overflow:hidden;"></div>
<div class="overflow-x-auto mt-4">
    <table class="table table-zebra table-sm" id="data-table">
        <thead></thead>
        <tbody></tbody>
    </table>
</div>

<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<script>
    function loadPlot() {
        var x_axis = document.getElementById('x-axis').value;
        var plot_level = document.getElementById('plot-level').value;
        doFetch(x_axis, plot_level);
    }

    document.getElementById('update-plot').addEventListener('click', loadPlot);

    document.addEventListener('DOMContentLoaded', loadPlot);

    function doFetch(x_axis, plot_level) {

        fetch('/get_day_of_week_data', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ x_axis: x_axis, plot_level: plot_level })
        })
            .then(response => response.json())
            .then(data => {
                var traces = [];
                var sortedX = data.x;
                for (var day in data.y) {
                    traces.push({ x: sortedX, y: data.y[day], mode: 'lines', name: day });
                }
                var layout = {
                    title: { text: 'Percentage of Games by Day of the Week', font: { color: '#e0f0f0', size: 14 } },
                    xaxis: {
                        title: x_axis === 'year_month' ? 'Year + Month' : 'Season Name',
                        tickangle: -45,
                        tickformat: x_axis === 'year_month' ? '%b %Y' : '',
                        dtick: x_axis === 'year_month' ? 'M4' : '',
                        color: '#e0f0f0',
                        gridcolor: '#1a6b6b'
                    },
                    yaxis: { title: 'Percentage of Games', color: '#e0f0f0', gridcolor: '#1a6b6b' },
                    margin: { t: 50, b: 100, l: 60, r: 20 },
                    paper_bgcolor: '#0d5555',
                    plot_bgcolor: '#0a4444',
                    font: { color: '#e0f0f0', size: 12 },
                    legend: { orientation: 'h', y: -0.25, font: { color: '#e0f0f0', size: 11 } },
                    height: 420
                };
                var config = { responsive: true, displayModeBar: false };
                Plotly.newPlot('plot', traces, layout, config);

                var table = document.getElementById('data-table');
                var thead = table.querySelector('thead');
                var tbody = table.querySelector('tbody');
                thead.innerHTML = '';
                tbody.innerHTML = '';

                var headerRow = document.createElement('tr');
                var th = document.createElement('th');
                th.innerText = 'Day of the Week';
                headerRow.appendChild(th);
                data.x.slice(-24).forEach(function (x_value) {
                    var th = document.createElement('th');
                    th.innerText = x_value;
                    headerRow.appendChild(th);
                });
                thead.appendChild(headerRow);

                ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'].forEach(function (day) {
                    var row = document.createElement('tr');
                    var td = document.createElement('td');
                    td.innerText = day;
                    row.appendChild(td);
                    data.y[day].slice(-24).forEach(function (value) {
                        var td = document.createElement('td');
                        td.innerText = (value * 100).toFixed(1) + '%';
                        row.appendChild(td);
                    });
                    tbody.appendChild(row);
                });
            });
    }
</script>
{% endblock %}
