{% extends "base.html" %}

{% block title %}Percentage of Games by Day of the Week{% endblock %}

{% block content %}
<h2 class="text-lg font-bold mt-4 mb-3 text-primary">Percentage of Games by Day of the Week</h2>
<div class="form-control mb-2">
    <label for="x-axis" class="label"><span class="label-text">Aggregate by:</span></label>
    <select class="select select-bordered select-sm bg-base-200" id="x-axis">
        <option value="season_name">Seasons</option>
        <option value="year_month">Year + Month</option>
    </select>
    <label for="plot-level" class="label mt-2"><span class="label-text">Choose a Division:</span></label>
    <select class="select select-bordered select-sm bg-base-200" id="plot-level">
        <option value="all">All</option>
        {% for level in levels %}
        <option value="{{ level }}">{{ level }}</option>
        {% endfor %}
    </select>
</div>
<button class="btn btn-primary btn-sm mb-4" id="update-plot">Update Plot</button>
<div class="w-full overflow-x-auto">
    <div id="plot" style="width: 100%; height: 600px;"></div>
</div>
<div class="overflow-x-auto mt-4">
    <table class="table table-zebra table-sm" id="data-table">
        <thead></thead>
        <tbody></tbody>
    </table>
</div>

<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<script>
    document.getElementById('update-plot').addEventListener('click', function () {
        var x_axis = document.getElementById('x-axis').value;
        var plot_level = document.getElementById('plot-level').value;

        fetch('/get_day_of_week_data', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ x_axis: x_axis, plot_level: plot_level })
        })
            .then(response => response.json())
            .then(data => {
                var traces = [];
                var sortedX = data.x;
                for (var day in data.y) {
                    traces.push({ x: sortedX, y: data.y[day], mode: 'lines', name: day });
                }
                var layout = {
                    title: 'Percentage of Games by Day of the Week',
                    xaxis: { title: x_axis === 'year_month' ? 'Year + Month' : 'Season Name', tickangle: x_axis === 'year_month' ? 90 : -45, tickformat: x_axis === 'year_month' ? '%b %Y' : '', dtick: x_axis === 'year_month' ? 'M4' : '' },
                    yaxis: { title: 'Percentage of Games' },
                    margin: x_axis === 'year_month' ? { b: 90 } : { b: 150 },
                    paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)', font: { color: '#f0f0f0' }
                };
                Plotly.newPlot('plot', traces, layout);

                var table = document.getElementById('data-table');
                var thead = table.querySelector('thead');
                var tbody = table.querySelector('tbody');
                thead.innerHTML = '';
                tbody.innerHTML = '';

                var headerRow = document.createElement('tr');
                var th = document.createElement('th');
                th.innerText = 'Day of the Week';
                headerRow.appendChild(th);
                data.x.slice(-24).forEach(function (x_value) {
                    var th = document.createElement('th');
                    th.innerText = x_value;
                    headerRow.appendChild(th);
                });
                thead.appendChild(headerRow);

                ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'].forEach(function (day) {
                    var row = document.createElement('tr');
                    var td = document.createElement('td');
                    td.innerText = day;
                    row.appendChild(td);
                    data.y[day].slice(-24).forEach(function (value) {
                        var td = document.createElement('td');
                        td.innerText = (value * 100).toFixed(1) + '%';
                        row.appendChild(td);
                    });
                    tbody.appendChild(row);
                });
            });
    });
</script>
{% endblock %}
