{% extends "base.html" %}

{% block title %}Days of Week{% endblock %}

{% block content %}
<h2 class="text-lg font-bold mt-4 mb-3 text-primary">SIAHL Schedule Games Distribution</h2>

<!-- Pass org list to JS -->
<script>
    window._DOW_ORGS = [
        {% for org in organizations %}
        { "id": {{ org.id }}, "name": {{ org.organization_name | tojson }} }{% if not loop.last %},{% endif %}
        {% endfor %}
    ];
</script>

{% include "days_of_week_dropdowns.html" %}

<div id="weekdays-weekends-chart" style="width:100%;height:420px;border-radius:8px;overflow:hidden;margin-bottom:20px;"></div>
<div id="days-of-week-chart" style="width:100%;height:420px;border-radius:8px;overflow:hidden;margin-bottom:20px;"></div>

<div class="loading-indicator text-center" id="loading-indicator" style="display: none;">
    <span class="loading loading-spinner loading-md"></span>
    <p>Loading data...</p>
</div>

<div id="dow-table-container" class="overflow-x-auto w-full mt-4"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<script>
    function fetchDaysData(orgId, leagueId, levelId, seasonId) {
        var loadingIndicator = document.getElementById('loading-indicator');
        loadingIndicator.style.display = 'block';
        document.getElementById('dow-table-container').innerHTML = '';
        fetch('/days_of_week/filter_days', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                org_id: orgId,
                league_id: leagueId,
                level_id: levelId,
                season_id: seasonId
            })
        })
            .then(response => {
                if (!response.ok) throw new Error('Network response was not ok: ' + response.statusText);
                return response.json();
            })
            .then(data => {
                renderTable(data);
                renderWeekdaysWeekendsChart(data);
                renderDaysOfWeekChart(data);
                loadingIndicator.style.display = 'none';
            })
            .catch(error => {
                document.getElementById('dow-table-container').innerHTML = '<p>Error loading data.</p>';
                loadingIndicator.style.display = 'none';
            });
    }

    function renderTable(data) {
        const container = document.getElementById('dow-table-container');
        if (!data || !data.header || !data.rows) { container.innerHTML = '<p>No data available.</p>'; return; }

        let html = '<h4 class="text-base font-semibold mt-4 mb-2 text-primary">Games by WeekDays and WeekEnds</h4>';
        html += '<table class="table table-zebra table-sm text-center mb-4">';
        html += '<thead><tr><th></th><th>WeekDays</th><th>WeekEnds</th></tr></thead><tbody>';
        for (const row of data.rows) {
            const weekDaysSum = row.data.slice(0, 5).reduce((a, b) => a + b, 0);
            const weekEndsSum = row.data.slice(5).reduce((a, b) => a + b, 0);
            html += `<tr><td>${row.label}</td><td>${weekDaysSum}</td><td>${weekEndsSum}</td></tr>`;
        }
        html += '</tbody></table>';

        html += '<h4 class="text-base font-semibold mt-4 mb-2 text-primary">Games by Days Of Week</h4>';
        html += '<table class="table table-zebra table-sm text-center">';
        html += '<thead><tr><th></th>';
        for (const day of data.header) { html += `<th>${day}</th>`; }
        html += '</tr></thead><tbody>';
        for (const row of data.rows) {
            html += `<tr><td>${row.label}</td>`;
            for (const val of row.data) { html += `<td>${val}</td>`; }
            html += '</tr>';
        }
        html += '</tbody></table>';
        container.innerHTML = html;
    }

    function renderWeekdaysWeekendsChart(data) {
        const chartContainer = document.getElementById('weekdays-weekends-chart');
        if (!chartContainer) return;
        const chartData = [];
        for (const row of data.rows) {
            if (row.label === "Total Games") continue;
            const weekDaysSum = row.data.slice(0, 5).reduce((a, b) => a + b, 0);
            const weekEndsSum = row.data.slice(5).reduce((a, b) => a + b, 0);
            const total = weekDaysSum + weekEndsSum;
            if (total === 0) continue;
            chartData.push({ label: row.label, weekdaysPercentage: (weekDaysSum / total) * 100 });
        }
        const labels = chartData.map(item => item.label).reverse();
        const percentages = chartData.map(item => item.weekdaysPercentage).reverse();
        const traces = [
            { x: labels, y: percentages, type: 'bar', name: '% WeekDays', marker: { color: 'rgba(75, 192, 192, 0.6)' } },
            { x: labels, y: Array(labels.length).fill(50), type: 'scatter', mode: 'lines', name: '50% Threshold', line: { color: 'orange', dash: 'dot' } }
        ];
        const layout = {
            title: 'Percentage of WeekDays out of Total Games',
            xaxis: { title: 'Seasons', tickangle: -45, color: '#e0f0f0', gridcolor: '#1a6b6b' },
            yaxis: { title: 'Percentage', range: [0, 100], color: '#e0f0f0', gridcolor: '#1a6b6b' },
            paper_bgcolor: '#0d5555',
            plot_bgcolor: '#0a4444',
            font: { color: '#e0f0f0', size: 12 },
            legend: { orientation: 'h', y: -0.25, font: { color: '#e0f0f0', size: 11 } },
            height: 420
        };
        Plotly.newPlot(chartContainer, traces, layout, { responsive: true, displayModeBar: false });
    }

    function renderDaysOfWeekChart(data) {
        const chartContainer = document.getElementById('days-of-week-chart');
        if (!chartContainer) return;
        const labels = data.rows.filter(row => row.label !== "Total Games").map(row => row.label).reverse();
        const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
        const colors = ['#FF5733', '#33FF57', '#3357FF', '#FF33A1', '#A133FF', '#33FFF5', '#F5FF33'];
        const traces = days.map((day, index) => ({
            x: labels,
            y: data.rows.filter(row => row.label !== "Total Games").map(row => row.data[index]).reverse(),
            name: day, type: 'bar', marker: { color: colors[index] }
        }));
        const layout = {
            title: 'Number of Games by Day of Week',
            barmode: 'stack',
            xaxis: { title: 'Seasons', tickangle: -45, color: '#e0f0f0', gridcolor: '#1a6b6b' },
            yaxis: { title: 'Number of Games', color: '#e0f0f0', gridcolor: '#1a6b6b' },
            paper_bgcolor: '#0d5555',
            plot_bgcolor: '#0a4444',
            font: { color: '#e0f0f0', size: 12 },
            legend: { orientation: 'h', y: -0.25, font: { color: '#e0f0f0', size: 11 } },
            height: 420
        };
        Plotly.newPlot(chartContainer, traces, layout, { responsive: true, displayModeBar: false });
    }
</script>
{% endblock %}
