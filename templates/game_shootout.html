{% extends "base.html" %}

{% block title %}Game Shootout Statistics{% endblock %}

{% block content %}
<h1 class="text-xl font-bold mb-4">Shootouts when tied stats</h1>
<form id="filter-form" method="post">
    <div class="form-control mb-2">
        <label for="league_number" class="label"><span class="label-text">Choose a League:</span></label>
        <select class="select select-bordered select-primary select-sm bg-base-100" id="league_number" name="league_number" required>
            {% for league in leagues %}
            <option value="{{ league.league_number }}">{{ league.league_name }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="form-control mb-2">
        <label for="plot_level" class="label"><span class="label-text">Choose a Division:</span></label>
        <select class="select select-bordered select-primary select-sm bg-base-100" id="plot_level" name="plot_level">
            <option value="all">All Divisions</option>
            {% for division in divisions %}
            <option value="{{ division }}">{{ division }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="form-control mb-2">
        <label for="x_axis" class="label"><span class="label-text">Aggregate by:</span></label>
        <select class="select select-bordered select-primary select-sm bg-base-100" id="x_axis" name="x_axis">
            <option value="season">Season</option>
            <option value="year_month">Year+Month</option>
        </select>
    </div>
    <button type="submit" class="btn btn-primary btn-sm mb-4">Submit</button>
</form>
<div id="plot-div" style="width:100%;height:420px;border-radius:8px;overflow:hidden;" class="mt-4"></div>

<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<script>
    function loadPlot() {
        const x_axis = document.getElementById('x_axis').value;
        const plot_level = document.getElementById('plot_level').value;
        const league_number = document.getElementById('league_number').value;
        fetch('/get_game_shootout_data', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ x_axis, plot_level, league_number })
        })
            .then(response => response.json())
            .then(data => {
                const x = data.x;
                const y = data.y;
                const traces = [];
                for (const [key, values] of Object.entries(y)) {
                    traces.push({ x: x, y: values, mode: 'lines+markers', name: key });
                }
                const layout = {
                    title: 'Game Shootout Statistics',
                    xaxis: { title: x_axis === 'year_month' ? 'Year/Month' : 'Season', color: '#e0f0f0', gridcolor: '#1a6b6b' },
                    yaxis: { title: 'Percentage', color: '#e0f0f0', gridcolor: '#1a6b6b' },
                    paper_bgcolor: '#0d5555',
                    plot_bgcolor: '#0a4444',
                    font: { color: '#e0f0f0', size: 12 },
                    legend: { orientation: 'h', y: -0.25, font: { color: '#e0f0f0', size: 11 } },
                    height: 420
                };
                if (x_axis === 'season') {
                    layout.xaxis.tickvals = data.x;
                    layout.xaxis.ticktext = data.season_names;
                }
                Plotly.newPlot('plot-div', traces, layout, { responsive: true, displayModeBar: false });
            });
    }

    document.getElementById('filter-form').addEventListener('submit', function (event) {
        event.preventDefault();
        loadPlot();
    });

    document.addEventListener('DOMContentLoaded', loadPlot);
</script>
{% endblock %}
