{% extends "base.html" %}

{% block title %}Time of Games{% endblock %}

{% block content %}
<h1 class="text-xl font-bold mb-4">Time of Games</h1>
<div class="form-control mb-2">
    <label for="plot-type" class="label"><span class="label-text">Comparison Mode:</span></label>
    <select class="select select-bordered select-primary select-sm bg-base-100" id="plot-type">
        <option value="compare_teams_by_level">Compare Teams Inside a Division</option>
        <option value="compare_levels_by_season">Compare Divisions</option>
    </select>
</div>
<div class="form-control mb-2" id="level-1-container" style="display: none;">
    <label for="level-1" class="label"><span class="label-text">Choose Division 1:</span></label>
    <select class="select select-bordered select-primary select-sm bg-base-100" id="level-1">
        <option value="all">ALL Divisions</option>
        {% for level in levels %}
        <option value="{{ level }}">{{ level }}</option>
        {% endfor %}
    </select>
</div>
<div class="form-control mb-2" id="level-2-container" style="display: none;">
    <label for="level-2" class="label"><span class="label-text">Choose Division 2:</span></label>
    <select class="select select-bordered select-primary select-sm bg-base-100" id="level-2">
        <option value="all">ALL Divisions</option>
        {% for level in levels %}
        <option value="{{ level }}">{{ level }}</option>
        {% endfor %}
    </select>
</div>
<div class="form-control mb-2" id="plot-level-container">
    <label for="plot-level" class="label"><span class="label-text">Choose a Division:</span></label>
    <select class="select select-bordered select-primary select-sm bg-base-100" id="plot-level">
        <option value="all">ALL Divisions</option>
        {% for level in levels %}
        <option value="{{ level }}">{{ level }}</option>
        {% endfor %}
    </select>
</div>
<button class="btn btn-primary btn-sm mb-4" id="update-plot">Update Plot</button>
<div id="plot-avg-start-time" style="width:100%;height:420px;border-radius:8px;overflow:hidden;"></div>
<div id="plot-last-slot" style="width:100%;height:420px;border-radius:8px;overflow:hidden;margin-top:20px;"></div>

<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<script>
    function getQueryParams() {
        const params = {};
        const queryString = window.location.search.substring(1);
        const regex = /([^&=]+)=([^&]*)/g;
        let m;
        while (m = regex.exec(queryString)) { params[decodeURIComponent(m[1])] = decodeURIComponent(m[2]); }
        return params;
    }

    function setDropdownValue(dropdownId, value) {
        const dropdown = document.getElementById(dropdownId);
        if (dropdown) dropdown.value = value;
    }

    document.getElementById('plot-type').addEventListener('change', function () {
        var plot_type = document.getElementById('plot-type').value;
        document.getElementById('level-1-container').style.display = plot_type === 'compare_levels_by_season' ? 'block' : 'none';
        document.getElementById('level-2-container').style.display = plot_type === 'compare_levels_by_season' ? 'block' : 'none';
        document.getElementById('plot-level-container').style.display = plot_type === 'compare_levels_by_season' ? 'none' : 'block';
    });

    document.getElementById('update-plot').addEventListener('click', function () { updatePlot(); });

    function updatePlot() {
        var plot_type = document.getElementById('plot-type').value;
        var level_1 = document.getElementById('level-1').value;
        var level_2 = document.getElementById('level-2').value;
        var plot_level = document.getElementById('plot-level').value;

        fetch('/get_time_of_games_data', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ plot_type: plot_type, level_1: level_1, level_2: level_2, plot_level: plot_level })
        })
            .then(response => response.json())
            .then(data => {
                var traces_avg = [];
                var traces_last_slot = [];
                if (plot_type === 'compare_levels_by_season') {
                    traces_avg.push({ x: data.x, y: data.y_avg_1, mode: 'lines+markers', name: `${level_1}` });
                    traces_avg.push({ x: data.x, y: data.y_avg_2, mode: 'lines+markers', name: `${level_2}` });
                    traces_last_slot.push({ x: data.x, y: data.y_last_slot_1.map(v => parseFloat(v).toFixed(1)), mode: 'lines+markers', name: `${level_1}` });
                    traces_last_slot.push({ x: data.x, y: data.y_last_slot_2.map(v => parseFloat(v).toFixed(1)), mode: 'lines+markers', name: `${level_2}` });
                } else {
                    traces_avg = data.traces_avg;
                    traces_last_slot = data.traces_last_slot.map(trace => { trace.y = trace.y.map(v => parseFloat(v).toFixed(1)); return trace; });
                }
                traces_avg.sort((a, b) => a.name.localeCompare(b.name));
                traces_last_slot.sort((a, b) => a.name.localeCompare(b.name));
                function formatTime(minutes) {
                    const hours = Math.floor(minutes / 60);
                    const mins = minutes % 60;
                    return `${hours}:${mins < 10 ? '0' : ''}${mins}`;
                }
                var tickvals = traces_avg.flatMap(trace => trace.y).sort((a, b) => a - b);
                var ticktext = tickvals.map(formatTime);
                var layout_avg = {
                    title: plot_type === 'compare_levels_by_season' ? `Avg Game Start Time for ${level_1} and ${level_2}` : `Avg Game Start Time for teams in ${plot_level}`,
                    xaxis: { tickangle: -30, tickfont: { size: 10 }, color: '#e0f0f0', gridcolor: '#1a6b6b' },
                    yaxis: { title: 'Start Time (HH:MM)', tickvals: tickvals, ticktext: ticktext, tickfont: { size: 10 }, color: '#e0f0f0', gridcolor: '#1a6b6b' },
                    paper_bgcolor: '#0d5555',
                    plot_bgcolor: '#0a4444',
                    font: { color: '#e0f0f0', size: 12 },
                    legend: { orientation: 'h', y: -0.25, font: { color: '#e0f0f0', size: 11 } },
                    height: 420
                };
                var layout_last_slot = {
                    title: plot_type === 'compare_levels_by_season' ? `% Last Slot Games for ${level_1} and ${level_2}` : `% Last Slot Games for teams in ${plot_level}`,
                    xaxis: { tickangle: -30, tickfont: { size: 10 }, color: '#e0f0f0', gridcolor: '#1a6b6b' },
                    yaxis: { title: 'Percentage (%)', tickfont: { size: 10 }, color: '#e0f0f0', gridcolor: '#1a6b6b' },
                    paper_bgcolor: '#0d5555',
                    plot_bgcolor: '#0a4444',
                    font: { color: '#e0f0f0', size: 12 },
                    legend: { orientation: 'h', y: -0.25, font: { color: '#e0f0f0', size: 11 } },
                    height: 420
                };
                var config = { responsive: true, displayModeBar: false };
                Plotly.newPlot('plot-avg-start-time', traces_avg, layout_avg, config);
                Plotly.newPlot('plot-last-slot', traces_last_slot, layout_last_slot, config);
            });
    }

    const params = getQueryParams();
    if (params.plot_type) setDropdownValue('plot-type', params.plot_type);
    if (params.level_1) setDropdownValue('level-1', params.level_1);
    if (params.level_2) setDropdownValue('level-2', params.level_2);
    if (params.plot_level) setDropdownValue('plot-level', params.plot_level);

    document.addEventListener('DOMContentLoaded', function () {
        if (params.plot_type || params.level_1 || params.level_2 || params.plot_level) {
            // dropdowns already set above, just update
        }
        updatePlot();
    });
</script>
{% endblock %}
