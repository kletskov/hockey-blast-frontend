<div class="flex flex-wrap items-center gap-3 mb-4 text-sm">
    <label for="organization" class="font-medium">Organization:</label>
    <select id="organization" name="organization" class="select select-bordered select-primary select-sm bg-base-100" disabled>
        <option value="1">Organization 1</option>
    </select>

    <label for="level" class="font-medium">Level:</label>
    <select id="level" name="level" class="select select-bordered select-primary select-sm bg-base-100">
        <option value="">All Levels</option>
    </select>

    <label for="season" class="font-medium">Season:</label>
    <select id="season" name="season" class="select select-bordered select-primary select-sm bg-base-100">
        <option value="">All Seasons</option>
    </select>
</div>

<script>
    function fetchLevels() {
        fetch('/days_of_week/filter_levels', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ org_id: 1 })
        })
            .then(response => response.json())
            .then(data => {
                data.sort((a, b) => a.level_name.localeCompare(b.level_name));
                const levelSelect = document.getElementById('level');
                levelSelect.innerHTML = '<option value="">All Levels</option>';
                data.forEach(level => {
                    levelSelect.innerHTML += `<option value="${level.id}">${level.level_name}</option>`;
                });
            });
    }

    function fetchSeasons() {
        fetch('/days_of_week/filter_seasons', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' }
        })
            .then(response => response.json())
            .then(data => {
                const seasonSelect = document.getElementById('season');
                seasonSelect.innerHTML = '<option value="">All Seasons</option>';
                data.forEach(season => {
                    seasonSelect.innerHTML += `<option value="${season.id}">${season.season_name}</option>`;
                });
            });
    }

    document.addEventListener('DOMContentLoaded', function () {
        fetchLevels();
        fetchSeasons();
    });
</script>
