{% extends "base.html" %}

{% block title %}Number Of Active Players over time or seasons{% endblock %}

{% block content %}
<h1 class="mb-4 text-xl font-bold">Number of Active Players over time</h1>
<div class="form-control mb-2">
    <label for="x-axis" class="label"><span class="label-text">X Axis:</span></label>
    <select class="select select-bordered select-primary select-sm bg-base-100" id="x-axis">
        <option value="season_name">Seasons</option>
        <option value="year_month">Year + Month</option>
        <option value="year_over_year">Year Over Year</option>
    </select>
</div>
<div class="form-control mb-2">
    <label for="plot-1" class="label"><span class="label-text">Plot 1:</span></label>
    <select class="select select-bordered select-primary select-sm bg-base-100" id="plot-1">
        <option value="all">All</option>
        {% for level in levels %}
        <option value="{{ level }}">{{ level }}</option>
        {% endfor %}
    </select>
</div>
<div class="form-control mb-2" id="plot-2-container">
    <label for="plot-2" class="label"><span class="label-text">Plot 2:</span></label>
    <select class="select select-bordered select-primary select-sm bg-base-100" id="plot-2">
        <option value="all">All</option>
        {% for level in levels %}
        <option value="{{ level }}">{{ level }}</option>
        {% endfor %}
    </select>
</div>
<div class="form-control mb-2">
    <label for="min-games" class="label"><span class="label-text">Minimum Games Played:</span></label>
    <select class="select select-bordered select-primary select-sm bg-base-100" id="min-games">
        {% for i in range(1, 11) %}
        <option value="{{ i }}">{{ i }}</option>
        {% endfor %}
    </select>
</div>
<button class="btn btn-primary btn-sm mb-4" id="update-plot">Update Plot</button>
<div class="w-full overflow-x-auto">
    <div id="plot" style="width: 100%; height: 600px;"></div>
</div>

<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<script>
    document.getElementById('x-axis').addEventListener('change', function () {
        var x_axis = document.getElementById('x-axis').value;
        var plot_2_container = document.getElementById('plot-2-container');
        if (x_axis === 'year_over_year') {
            plot_2_container.style.display = 'none';
        } else {
            plot_2_container.style.display = 'block';
        }
    });

    document.getElementById('update-plot').addEventListener('click', function () {
        var x_axis = document.getElementById('x-axis').value;
        var plot_1 = document.getElementById('plot-1').value;
        var plot_2 = document.getElementById('plot-2').value;
        var min_games = document.getElementById('min-games').value;

        fetch('/get_plot_data', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ x_axis: x_axis, plot_1: plot_1, plot_2: plot_2, min_games: min_games })
        })
            .then(response => response.json())
            .then(data => {
                var traces = [];
                var layout = {
                    title: 'Active Players Over Time',
                    xaxis: { title: x_axis === 'year_month' ? 'Year + Month' : (x_axis === 'season_name' ? 'Seasons' : 'Month') },
                    yaxis: { title: 'Active Players' }
                };

                if (x_axis === 'year_over_year') {
                    for (var year in data.years) {
                        traces.push({ x: data.months, y: data.years[year], mode: 'lines', name: year });
                    }
                } else {
                    traces.push({ x: data.x, y: data.y_1, mode: 'lines', name: data.plot_1_name });
                    traces.push({ x: data.x, y: data.y_2, mode: 'lines', name: data.plot_2_name });
                    if (x_axis === 'season_name') {
                        layout.xaxis.tickvals = data.x;
                        layout.xaxis.ticktext = data.season_names;
                    }
                }

                Plotly.newPlot('plot', traces, layout);
            });
    });
</script>
{% endblock %}
